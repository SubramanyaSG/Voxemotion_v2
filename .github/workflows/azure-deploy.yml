name: Deploy VoxEmotion to Azure App Service

on:
  push:
    branches:
      - main   # Deploy automatically on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout code ────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Set up Python 3.10 ───────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ── 3. Install dependencies ─────────────────────────────
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ── 4. Deploy to Azure Web App ──────────────────────────
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}       # Set in GitHub Secrets
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}  # Set in GitHub Secrets
        package: .
